<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #8e8e8e;
      --text-muted: #b0b0b0;
      --border: #efefef;
      --accent: #e1306c;
      --tag-bg: #f0f0f0;
      --tag-active-bg: #1a1a1a;
      --tag-active-text: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ========== Profile Header ========== */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .avatar:hover { transform: scale(1.05); }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .profile-name:hover { color: var(--accent); }

    .profile-bio {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .profile-stats {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 16px; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }

    /* ========== Toolbar ========== */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .tags-wrapper {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .tag {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .tag:hover { background: #e0e0e0; color: var(--text-primary); }
    .tag.active { background: var(--tag-active-bg); color: var(--tag-active-text); }

    /* ========== Photo Grid ========== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius-xs);
      cursor: pointer;
      background: var(--border);
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .grid-item:hover img { transform: scale(1.08); }

    .grid-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 50%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
    }

    .grid-item:hover .overlay { opacity: 1; }

    .overlay-title {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .overlay-stats {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .overlay-stat {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .overlay-stat svg {
      width: 12px;
      height: 12px;
      fill: rgba(255,255,255,0.85);
    }

    /* ========== Loading ========== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* ========== Empty State ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-state svg {
      width: 48px;
      height: 48px;
      fill: var(--border);
      margin-bottom: 12px;
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .container { padding: 16px 12px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 3px; }
      .profile-stats { display: none; }
      .tag { padding: 4px 10px; font-size: 11px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Profile Header -->
    <div class="profile-header" id="profileHeader"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="tags-wrapper" id="tagsWrapper"></div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>加载中...</p>
    </div>

    <!-- Photo Grid -->
    <div class="grid" id="photoGrid" style="display:none;"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <p>该分类暂无照片</p>
    </div>
  </div>

  <script>
    let galleryData = null;
    let currentFilter = 'all';

    // Auto-detect photos.json path (same directory as index.html)
    const DATA_URL = new URL('photos.json', window.location.href).href;

    document.addEventListener('DOMContentLoaded', loadGallery);

    async function loadGallery() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('无法加载 photos.json（HTTP ' + res.status + '）');
        galleryData = await res.json();
        init();
      } catch (err) {
        document.getElementById('loading').innerHTML =
          '<p style="font-size:14px; color:#cc0000;">❌ 加载失败</p>' +
          '<p style="font-size:12px; margin-top:8px; color:var(--text-muted);">' + err.message + '</p>' +
          '<p style="font-size:12px; margin-top:12px; color:var(--text-muted);">请确保 photos.json 与 index.html 在同一目录下</p>';
      }
    }

    function init() {
      renderProfile();
      currentFilter = 'all';
      renderTags();
      renderGrid();
      document.getElementById('loading').style.display = 'none';
    }

    function renderProfile() {
      const p = galleryData.profile;
      const header = document.getElementById('profileHeader');
      header.innerHTML = `
        <img class="avatar" src="${esc(p.avatar)}" alt="${esc(p.name)}">
        <div class="profile-info">
          <a class="profile-name" href="${esc(p.link)}" target="_blank">${esc(p.name)}</a>
          <div class="profile-bio">${esc(p.bio)}</div>
        </div>
        <div class="profile-stats">
          <div class="stat"><div class="stat-value">${formatNum(galleryData.photos.length)}</div><div class="stat-label">照片</div></div>
          ${p.followers ? `<div class="stat"><div class="stat-value">${formatNum(p.followers)}</div><div class="stat-label">粉丝</div></div>` : ''}
        </div>
      `;
    }

    function renderTags() {
      const wrapper = document.getElementById('tagsWrapper');
      const tags = ['all', ...(galleryData.tags || [])];
      const labels = { all: '全部', ...(galleryData.tagLabels || {}) };

      wrapper.innerHTML = tags.map(tag =>
        `<button class="tag${tag === currentFilter ? ' active' : ''}" onclick="setFilter('${tag}')">${labels[tag] || tag}</button>`
      ).join('');
    }

    function setFilter(tag) {
      currentFilter = tag;
      renderTags();
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('photoGrid');
      const empty = document.getElementById('emptyState');

      let photos = galleryData.photos;
      if (currentFilter !== 'all') {
        photos = photos.filter(p => (p.tags || []).includes(currentFilter));
      }

      if (photos.length === 0) {
        grid.style.display = 'none';
        empty.classList.add('visible');
        return;
      }

      empty.classList.remove('visible');
      grid.style.display = 'grid';

      grid.innerHTML = photos.map(p => `
        <a class="grid-item" href="${esc(p.link)}" target="_blank" rel="noopener">
          <img src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy">
          <div class="overlay">
            <div class="overlay-title">${esc(p.title)}</div>
            ${p.likes !== undefined ? `
            <div class="overlay-stats">
              <span class="overlay-stat">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                ${formatNum(p.likes)}
              </span>
            </div>` : ''}
          </div>
        </a>
      `).join('');
    }

    function formatNum(n) {
      if (n >= 10000) return (n / 10000).toFixed(1) + '万';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
